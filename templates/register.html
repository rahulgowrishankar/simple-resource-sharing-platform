{% extends "base.html" %}
{% block content %}

<div style="max-width:420px; margin:40px auto;">
    <div style="margin-bottom:28px;">
        <h1 style="font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:var(--ink); margin-bottom:4px;">Create an account</h1>
        <p style="color:var(--ink-3); font-size:14px;">Join the KCT Resource Hub and start sharing.</p>
    </div>

    <div class="card" style="padding:32px;">
        <form method="POST">
            <div class="form-group">
                <label class="label" for="name">Full name</label>
                <input class="input" type="text" name="name" id="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label class="label" for="email">Email address</label>
                <input class="input" type="email" name="email" id="email" placeholder="you@college.edu" required>
            </div>

            <div class="form-group" style="margin-bottom:24px;">
                <label class="label" for="password">Password</label>
                <input class="input" type="password" name="password" id="password" placeholder="Choose a strong password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; height:44px; font-size:15px;">
                Create account
            </button>
        </form>
    </div>

    <p style="text-align:center; margin-top:18px; font-size:14px; color:var(--ink-3);">
        Already have an account?
        <a href="{{ url_for('login') }}" style="color:var(--accent); font-weight:600; text-decoration:none;">Sign in</a>
    </p>
</div>

{% endblock %}
